version: 1
plan:
  name: 'Phase 15 稳定 + 可诊断，Phase 18 规则引擎（read-only）'
  max_concurrency: 6
  max_consecutive_failures: 3
  max_cycles: 30
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0
tasks:
  # ===================== Track 1: Phase 15 =====================
  - id: p15-crash-safe-prefs
    title: 'Phase 15.1：crash-safe 写入 preferences'
    prompt: |
      ## 目标
      把 eframe::Storage 当前的非原子写入改成崩溃安全的原子写入，确保
      进程在 save 期间被杀时，已存在的 preferences 文件不会被截断成空文件
      或半截 JSON。

      ## 项目背景
      - 工作目录：/Users/ivan/Projects/DiskMap
      - 技术栈：Rust 1.85+, eframe 0.34, egui 0.34
      - 当前所有偏好（`STORAGE_*` keys）通过 `eframe::Storage::set_string` 直接写，
        文件在进程崩溃时可能截断。请先读 src/app.rs:444-477 (`save_preferences`) 了解
        当前实现，再读 src/cleanup.rs:107-150 (`protected_path_reason_with_deny_list`)
        学习现有的 path 处理风格（也是这个 codebase 的风格）
      - AGENTS.md 在仓库根，写入 conventions 和 "do not" 清单

      ## 任务
      1. 引入一个小的 `storage` helper（`src/storage.rs` 或类似）提供：
         - `pub fn write_atomically(storage: &dyn eframe::Storage, key: &str, value: &str) -> anyhow::Result<()>`
         - 行为：写到临时文件 → fsync → rename 到最终位置。如果 eframe::Storage
           不暴露文件路径，就用 side-file 方案：写 `disk-map-storage.json.tmp` 在
           `eframe::Storage` 同一目录下，atomic rename 覆盖原文件（仍然要原子）
         - 如果 eframe::Storage 的实现不支持自定义路径（只能 key-value API），
           就用 `dirs_next` 或 `eframe` 暴露的 storage_dir() 拿目录，自己管 side file
      2. 把 `DiskMapApp::save_preferences` 改为走 atomic helper
      3. 增加 unit test：
         - 模拟一次"原子写中途崩溃" → 验证：要么旧文件完整存在，要么新文件完整存在，
           不会留下空文件 / 截断文件
         - 模拟正常写 → 验证：reader 拿到的就是新值
         - 跑 `cargo test --lib`，新 test + 已有 2 个 round-trip test 全过
      4. 跑 `cargo clippy --all-targets --all-features -- -D warnings` 必须 clean
      5. 跑 `cargo build --release` 必须 OK

      ## 不要做
      - 不要把 SQLite cache 改成 crash-safe（Phase 15 范围内是 preferences/history/snapshots，
        本任务只做 preferences）
      - 不要改动 STORAGE_* 列表
      - 不要引入新依赖（如 `tempfile`），能用 std::fs 就用 std::fs
      - 不要破坏现有 128 个 lib tests

      ## 交付
      - 改完的文件 + 1 个新文件 + 新增 tests
      - commit message：`feat: crash-safe preferences write`
      - push 到 main
      - 在 deliverable.md 写明：改了哪些文件、用了什么 atomic write 策略、
        新 test 名字、如何模拟崩溃（用什么信号或 syscall）
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      你是 verifier，**独立** 验证 coder 的 crash-safe preferences 实现。
      不要只读 diff，必须实际跑代码。

      ## 验证清单
      1. cd /Users/ivan/Projects/DiskMap && git pull && cargo test --lib
         - 必须全过
         - 必须有至少 1 个新 test 名字带 "crash" 或 "atomic" 或 "interrupted"
      2. cargo clippy --all-targets --all-features -- -D warnings 必须 clean
      3. 实际模拟一次崩溃场景。独立写一个临时 rust 文件，调用 atomic helper，
         在中途 SIGKILL 进程，验证：旧文件还在 或 新文件完整存在，**不能是空文件 / 截断**
      4. 读 src/app.rs:444-477（save_preferences）确认：
         - 旧直接 set_string 全部被 atomic helper 替代
         - STORAGE_* 列表完整
      5. 读 src/storage.rs（如果新增）确认：
         - 用了 temp file + rename 模式
         - 处理了 fsync 失败
         - 没有引入新 crates（除非是 std）
      6. 不在 STORAGE_* 列表里新加东西，没有破坏其他 key

      ## FAIL 条件
      - 任何 test 失败
      - clippy warning
      - 模拟崩溃后留下空 / 截断文件
      - 引入了非 std 依赖
      - save_preferences 还有直接 set_string 调用没走 atomic helper
    timeout_ms: 1800000

  - id: p15-bench-suite
    title: 'Phase 15.2：large-tree 基准测试 + 固定 fixture'
    prompt: |
      ## 目标
      在 `benches/perf.rs` 旁边加一个**固定 fixture 的大目录基准测试**，
      跑 3 个量级：1k / 10k / 100k 文件的合成目录树。当前 `benches/perf.rs`
      是合成 1k 节点，跟真实大盘有数量级差距。

      ## 项目背景
      - 工作目录：/Users/ivan/Projects/DiskMap
      - 已有 `benches/perf.rs`（criterion），覆盖 scan batch、parent lookup、search incremental、treemap layout
      - 已有 `dev-dependencies: criterion = "0.5"`
      - 关键代码：
        - `src/scanner.rs::scan_path_to_tree` — 主扫描入口
        - `src/treemap.rs::layout_treemap` — treemap 布局
        - `src/tree.rs` — TreeStore
        - `src/app/search_nav.rs` — 搜索重建

      ## 任务
      1. 加一个 `benches/fixtures.rs` 或在 `benches/perf.rs` 里加 `large_tree_bench`：
         - 第一次跑时生成 3 个目录树到 `target/bench-fixtures/`：1k, 10k, 100k 节点
         - 节点分布：~70% 文件 + 30% 目录，文件 size 随机（0 - 10MB 之间）
         - 如果目录已存在就跳过生成（不要每次跑 bench 都重生成）
         - 跑 `scan_path_to_tree` on 3 个 fixtures，记录 wall time
         - 跑 `layout_treemap` on 扫描后的树，记录 wall time
         - 用 `c.benchmark_group` 把结果分组
      2. 加 `Makefile` 目标或文档说明：`cargo bench --bench perf -- --bench large_tree`
      3. 加一个简单的 baseline 记录：`benches/baselines/large_tree.txt`，
         第一行是 `# generated by cargo bench --bench perf -- --bench large_tree`
         接下来是 `1k: <ms>`, `10k: <ms>`, `100k: <ms>` 一行一组
         - 不要写自动回归检测（这超出 scope），只是**记录**当前数字
         - 同时在 README.md 的 "Benchmarking" 节里更新：现在有 large-tree 套件，
           fixture 在 `target/bench-fixtures/`
      4. 跑 `cargo bench --bench perf -- --bench large_tree` 确认能跑通，
        生成 baselines/large_tree.txt
      5. 跑 `cargo clippy --all-targets --all-features -- -D warnings` 必须 clean
      6. 跑 `cargo test --lib` 现有 128 tests 全过（你可能需要给新生成的 fixture 加 .gitignore）

      ## 不要做
      - 不要把现有 benches/perf.rs 删了或大幅改
      - 不要在 fixture 里放真实文件（只用随机生成的空文件 + 部分非空文件）
      - 不要超过 100k 节点 — 那是 Phase 15 后期的事
      - 不要把 fixture 目录 commit 到 git（必须 .gitignore）

      ## 交付
      - 改了 `benches/perf.rs` 或新增 `benches/large_tree.rs`（带 `[[bench]]` 配置）
      - 新增 `benches/baselines/large_tree.txt`
      - 更新 README.md 的 Benchmarking 节
      - .gitignore 加 `target/bench-fixtures/`
      - commit：`test(bench): add large-tree benchmark suite`
      - push
      - deliverable.md：跑了什么、3 个 fixture 各用了多少 wall time、baselines 在哪
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      你是 verifier，**独立** 跑 verifier 自己的 benchmark 一遍。

      ## 验证清单
      1. cd /Users/ivan/Projects/DiskMap && git pull
      2. `cargo test --lib` 全过
      3. `cargo clippy --all-targets --all-features -- -D warnings` clean
      4. 自己跑 `cargo bench --bench perf -- --bench large_tree`
         - 必须能跑通，不 panic
         - 跑完后 benches/baselines/large_tree.txt 存在且有 1k/10k/100k 三行
      5. 验证 fixture 是**程序生成**的（不是手写或下载）：
         - 看 benches/ 的代码，确认有 setup 函数生成 1k/10k/100k 树
         - 删除 target/bench-fixtures/ 重新跑 bench，看 fixture 重新生成
      6. 验证 fixture 没被 commit：
         - `git status` 不能有 target/bench-fixtures/ 之类
         - .gitignore 包含 `target/bench-fixtures/`
      7. 验证 README.md 提到了 large-tree benchmark 和 fixture 位置
      8. 跑两次 bench（fixture 复用），第二次比第一次快 < 10% 就 OK；不然说明 fixture
         路径错了导致每次重生成

      ## FAIL 条件
      - benches/perf.rs 原有的 4 个 benchmark 任何一个被破坏（自己跑一遍原 bench 确认）
      - fixture 路径或 size 跟 SPEC 不一致（1k, 10k, 100k）
      - 100k 节点 fixture 跑超过 5 分钟（说明生成算法有问题）
      - baselines 文件没有 1k/10k/100k 全部三个数
    timeout_ms: 1800000

  - id: p15-diagnostics-bundle
    title: 'Phase 15.3：diagnostics bundle 一键导出'
    prompt: |
      ## 目标
      加一个"导出诊断包"功能：用户点菜单/按钮，把当前 app 状态 + perf counters
      + 最近错误 + 平台/版本信息打包成一个 zip 写到 CWD。用来在 app 出怪问题时
      贴给别人看。

      ## 项目背景
      - 工作目录：/Users/ivan/Projects/DiskMap
      - 已有 perf counter：src/scanner.rs::PerfStats（在 ScanMessage::Finished 带回）
      - 已有 status 字符串：app.status，存各种 scan 状态
      - 没有 "recent errors" 集合，需要你设计一个简单的 ring buffer
      - 平台信息：可以用 `std::env::consts::{OS, ARCH}` + `env!("CARGO_PKG_VERSION")`
      - 红化路径：暴露给 bundle 时要把用户 home 路径替换成 `~`（避免泄露）
      - 已有 zip 依赖吗？检查 Cargo.toml；如果没有，**不要**新增 zip 依赖，
        改成手写 .tar 或者直接写多个 .txt 文件到一个目录然后整体 tar
        简化方案：直接用 `tar` 命令（std::process::Command）打包

      ## 任务
      1. 加 `src/diagnostics.rs`：
         - `pub struct DiagnosticsBundle` — 包含 app version, OS/ARCH, scan root,
           recent_errors (Vec<String>), perf_stats (PerfStats 序列化), app status,
           时间戳
         - `pub fn build(app: &DiskMapApp) -> DiagnosticsBundle`
         - `pub fn write_to(&self, dir: &Path) -> anyhow::Result<PathBuf>` —
           写 3-5 个 .txt 到目标目录，返回 manifest.txt 路径
         - 路径红化：把所有 PathBuf 通过 `redact_home(path)` 转成字符串再写
         - 单元测试：build + write_to 一个 temp dir，验证文件存在且内容含版本号
      2. 加 "Export Diagnostics" 按钮到 `app/panels/sections.rs::show_progress_section`
        或 `app/panels/details.rs::show_details_panel` 的合适位置
         - 按钮点下去 → 调用 write_to(CWD) → 状态栏显示 "Wrote diagnostics-<timestamp>/"
         - 如果失败，状态栏显示 "Diagnostics export failed: <err>"
      3. 加 1 个 unit test 覆盖 build + write + path 红化
      4. 跑 `cargo test --lib` 全过
      5. 跑 `cargo clippy --all-targets --all-features -- -D warnings` clean
      6. 跑 `cargo build --release` OK

      ## 不要做
      - 不要加 zip 依赖（如果当前没有）
      - 不要把整个 TreeStore 序列化进 bundle（太大了，只放 summary + 关键 stat）
      - 不要把 preferences 写进 bundle（包含 home 路径，会泄露）
      - 不要做"自动诊断"——只是"打包现状"
      - 不要做 UI 重设计

      ## 交付
      - 新增 src/diagnostics.rs + tests
      - 改 1 个 panel 文件加按钮
      - commit：`feat: add diagnostics bundle export`
      - push
      - deliverable.md：bundle 包含哪些文件、按钮在哪、路径红化示例
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      你是 verifier，**独立** 测 diagnostics bundle。

      ## 验证清单
      1. cd /Users/ivan/Projects/DiskMap && git pull
      2. `cargo test --lib` 全过
      3. `cargo clippy --all-targets --all-features -- -D warnings` clean
      4. 读 src/diagnostics.rs：确认有 DiagnosticsBundle struct + build + write_to
      5. 验证路径红化：写一个临时测试或读 unit test，
         确认 home 路径（`/Users/ivan/...`）被替换为 `~/...`
      6. 验证不泄露敏感信息：
         - 读 build 函数，确认没有把 preferences/TreeStore 全量序列化
         - 确认没有 raw 路径暴露（只放 root_path 一个）
      7. 找 UI 入口（"Export Diagnostics" 按钮）位置：
         - 在 panels/sections.rs 或 panels/details.rs 里
         - 点了之后会调用 write_to 并更新 status
      8. **独立** 写一个简单的 e2e：用 `cargo test` 加一个 integration test
         调 `DiagnosticsBundle::build` 和 `write_to(/tmp/diskmap-test-bundle)`，
         确认目录里有 ≥3 个文件 + manifest.txt

      ## FAIL 条件
      - bundle 包含 home 路径明文
      - bundle 包含完整 TreeStore
      - 路径红化逻辑有 bug（如 `/Users/foo` 没被替换）
      - 新 test 没覆盖 write_to
      - UI 按钮点了会 panic 或写错位置
    timeout_ms: 1800000

  # ===================== Track 2: Phase 18 =====================
  - id: p18-rule-foundation
    title: 'Phase 18.1+18.2：rule 数据模型 + 默认规则集'
    prompt: |
      ## 目标
      设计"规则引擎"的数据模型和默认规则集。这是 Phase 18 的 foundation，
      后续 UI / 导入导出 / 试 fixtures 都依赖这个。

      ## 项目背景
      - 工作目录：/Users/ivan/Projects/DiskMap
      - 现有 read-only 分析：
        - `src/duplicates.rs::find_duplicate_candidates` — 同名同 size
        - `src/insights.rs::analyze_insights` — age + type buckets
        - `src/cleanup.rs::protected_path_reason` — 受保护路径检测
      - 整个 Phase 18 的设计前提：**read-only**，绝不执行删除/移动
      - AGENTS.md 强调：分析模块参考 duplicates.rs / insights.rs / snapshot.rs 的模式
        (analyze_*(...), read-only, take limit, return Option<Report>)

      ## 任务
      1. 新建 `src/rules.rs`：
         - `pub struct Rule`：`id: String`, `name: String`, `description: String`,
           `category: RuleCategory`, `predicate: RulePredicate`, `enabled: bool`
         - `pub enum RuleCategory { AnomalyHint, CleanupCandidate, ProtectedPath }`
         - `pub enum RulePredicate`：
           - `DuplicateCandidate { min_size: u64 }` — 同名同 size，最小 size
           - `LargeInDir { min_size: u64 }` — 在某目录下大文件
           - `OldFile { min_age_days: u64, min_size: u64 }` — 旧文件
           - `ExtensionCategory { categories: Vec<String> }` — 文件类型分类
           - `AlwaysProtected { path_pattern: String }` — 路径模式
           - `Hidden { excluded: bool }` — 隐藏文件
           - `Symlink { policy: SymlinkPolicy }` — symlink 策略
         - `pub struct RuleSet { rules: Vec<Rule> }` + `add/remove/get/enable/disable` 方法
         - `pub fn default_ruleset() -> RuleSet` — 返回硬编码的默认规则
         - `pub fn matches(rule: &Rule, node: &Node, ctx: &RuleContext) -> bool` —
           评估规则对一个节点是否命中（read-only，纯函数）
         - `pub struct RuleContext` — 评估时的上下文（focused path, mtime now, etc.）
         - `pub fn evaluate_rules(rules: &RuleSet, tree: &mut TreeStore, root_id: NodeId,
            limit: usize) -> Vec<RuleHit>` — 应用规则到树，返回命中
         - `pub struct RuleHit { rule_id: String, node_id: NodeId, score: u32, reason: String }`
         - 所有字段都 derive Debug, Clone, PartialEq, Eq
      2. 把现有 `duplicates.rs` / `insights.rs` / `cleanup.rs` 一些逻辑
         **用规则重写**（或至少让默认规则能覆盖它们的行为）：
         - 默认规则 1：DuplicateCandidate min_size=1024 → 对应 duplicates.rs
         - 默认规则 2：OldFile min_age_days=365 min_size=104857600 → 对应 insights.rs
         - 默认规则 3：AlwaysProtected "/System" → 对应 cleanup.rs 的 system location
         - 默认规则 4：AlwaysProtected "/Library" → 同上
         - 这些规则**不**直接调用 duplicates/insights/cleanup 的代码，
           而是新规则引擎自己实现等价逻辑
         - 但你**不要**删 duplicates/insights/cleanup 现有代码——它们还在用，
           迁移留给后续 task
      3. Unit tests 必须覆盖：
         - empty ruleset → no hits
         - single rule matches a node → hit
         - rule doesn't match → no hit
         - limit 切顶
         - default_ruleset() 不为空
      4. 跑 `cargo test --lib` 全过
      5. 跑 `cargo clippy --all-targets --all-features -- -D warnings` clean
      6. 跑 `cargo build --release` OK

      ## 不要做
      - 不要碰 `duplicates.rs` / `insights.rs` / `cleanup.rs` 的现有 API
      - 不要做 UI（这是 foundation）
      - 不要做持久化（下一个 task 18.3+18.4 做）
      - 不要在规则里加"action"——只有 predicate，没有 destructive side effect
      - 不要做 async（保持纯函数 + 同步评估）

      ## 交付
      - 新增 src/rules.rs + tests
      - commit：`feat(rules): add rule data model and default ruleset`
      - push
      - deliverable.md：Rule 字段、RuleCategory/RulePredicate 枚举、默认规则列表、
        evaluate_rules 的输出格式、为什么 read-only
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      你是 verifier，**独立** 验证规则引擎 foundation。

      ## 验证清单
      1. cd /Users/ivan/Projects/DiskMap && git pull
      2. `cargo test --lib` 全过（应该至少 +5 个新 test）
      3. `cargo clippy --all-targets --all-features -- -D warnings` clean
      4. 读 src/rules.rs：
         - Rule struct 字段：id, name, description, category, predicate, enabled
         - RuleCategory 至少 3 个 variant
         - RulePredicate 至少 5 个 variant
         - `matches` 是纯函数（签名无 &mut，没有 IO）
         - `evaluate_rules` 不会修改 tree（除了 ensure_sorted_children，
           这是 duplicates/insights 都允许的 read-only 操作）
         - 没有任何 &mut self 走到 delete / fs::remove 的地方
      5. 写一个临时 test 验证 read-only 不变性：
         - 构造一个 tree，evaluate_rules 跑两次
         - 验证 tree 两次跑完 size / children 数一致
      6. 验证 default_ruleset() 返回 ≥3 个规则
      7. 验证 matches 在 edge case 都不 panic（空 path、root path、Aggregate 节点）

      ## FAIL 条件
      - 任何 test 失败
      - clippy warning
      - 规则引擎不是 read-only（搜索代码确认没有 `remove_file` / `remove_dir_all` /
        `move_to_trash` 在 src/rules.rs 中被调用）
      - Rule 结构有 Hash/BTreeMap 等破坏 Eq 的字段没有 derive 正确
      - matches 函数签名拿了 &mut
    timeout_ms: 1800000

  - id: p18-rule-ui
    title: 'Phase 18.3：规则编辑器 UI（list + toggle + 内联编辑）'
    prompt: |
      ## 目标
      在 app 右侧 sidebar 加一个 "Rules" section，让用户看 / 启用 / 禁用
      / 改 enabled 状态 / 看 description。不做添加新规则（导入导出另开 task）。

      ## 项目背景
      - 工作目录：/Users/ivan/Projects/DiskMap
      - 上一个 task p18-rule-foundation 创建了 src/rules.rs
      - 现有 sidebar section 在 `src/app/panels/sections.rs`，模式是 free function
        `pub fn show_<thing>_section(ui: &mut egui::Ui, p: &Palette, app: &DiskMapApp)`
      - AGENTS.md 强调：app/panels/ 是 UI 渲染的归属，app.rs 只做 1-line forward
      - DiskMapApp 字段加 `pub(super) rules: RuleSet`（参考现有 cleanup_queue 模式）

      ## 任务
      1. `src/app.rs` DiskMapApp 加：
         - `pub(super) rules: RuleSet` 字段
         - `Default::default()` 里初始化为 `RuleSet::default()` (即 `default_ruleset()`)
         - 你**不要**加 STORAGE_* key（持久化留给 18.4 task）。这一阶段 rules
           每次启动都从 default_ruleset 重建
      2. 新建 `src/app/panels/rules_section.rs`：
         - `pub fn show_rules_section(ui: &mut egui::Ui, p: &Palette, app: &mut DiskMapApp)`
         - 渲染：每个 rule 一行
           - checkbox (rule.enabled) — toggle 启用
           - rule.name
           - rule.description（小字，muted）
         - 点 checkbox 立刻修改 `app.rules.toggle(rule.id)`
         - section 顶部："RULES (N enabled)" 标题
